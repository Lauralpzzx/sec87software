<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>SEP - Mi Portal Escolar (Asistencia)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="../../assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="bg-sepBeige font-sans text-gray-800 antialiased selection:bg-sepGold selection:text-sepBurgundyDark bg-fixed" >
  <div class="flex h-screen overflow-hidden relative">
    
    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-sepBurgundyDark/40 backdrop-blur-sm z-30 hidden md:hidden transition-opacity duration-300"></div>

    <aside id="sidebar" class="w-72 bg-sepGreenDark text-white flex-shrink-0 flex flex-col sidebar-transition absolute z-40 h-full transform -translate-x-full md:relative md:translate-x-0 shadow-2xl md:shadow-none border-r border-white/5">
      <div class="p-8 border-b border-white/10 flex flex-col items-center relative bg-black/10">
        <button id="close-sidebar-btn" class="absolute top-4 right-4 md:hidden text-white/50 hover:text-white transition-colors">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <div class="w-20 h-20 bg-gradient-to-tr from-sepGold to-yellow-200 rounded-2xl mb-4 flex items-center justify-center shadow-glow transform transition duration-500 hover:scale-105 hover:rotate-3 group cursor-pointer" onclick="window.location.href='dashboard.html'">
          <span class="text-sepBurgundy font-heading font-black text-2xl tracking-tighter group-hover:text-sepBurgundyDark transition-colors">SEP</span>
        </div>
        <h1 class="text-xs font-bold text-center uppercase tracking-widest text-white/90 font-heading">Portal del Estudiante</h1>
        <p class="text-[10px] text-sepGold mt-2 font-semibold bg-black/30 px-3 py-1 rounded-full uppercase tracking-wider backdrop-blur-sm shadow-inner">Secundaria Técnica No. 87</p>
      </div>

      <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <a class="flex items-center space-x-3 p-3.5 rounded-xl text-white/70 hover:text-white hover:bg-white/10 hover:translate-x-1 transition-all duration-300 group" href="dashboard.html">
          <svg class="h-5 w-5 group-hover:text-sepGold transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
          <span class="font-medium tracking-wide">Mi Resumen</span>
        </a>
        <a class="flex items-center space-x-3 p-3.5 rounded-xl bg-gradient-to-r from-sepGold/20 to-transparent border-l-4 border-sepGold shadow-[inset_0_0_20px_rgba(212,175,55,0.05)] text-sepGold group relative overflow-hidden" href="asistencia.html">
          <svg class="h-5 w-5 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          <span class="font-semibold relative z-10 font-heading tracking-wide">Asistencia</span>
        </a>
        <a class="flex items-center space-x-3 p-3.5 rounded-xl text-white/70 hover:text-white hover:bg-white/10 hover:translate-x-1 transition-all duration-300 group" href="reportes.html">
          <svg class="h-5 w-5 group-hover:text-sepGold transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
          <span class="font-medium tracking-wide">Mis Reportes</span>
        </a>
      </nav>

      <div class="p-5 bg-black/20 border-t border-white/10 backdrop-blur-sm">
        <div class="flex items-center space-x-3 group cursor-pointer" onclick="window.location.href='dashboard.html'">
          <div id="sidebar-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-sepGold to-yellow-600 flex items-center justify-center text-sepBurgundy font-bold shadow-md group-hover:shadow-glow transition-all duration-300"></div>
          <div class="overflow-hidden">
            <p id="sidebar-name" class="text-sm font-bold truncate text-white group-hover:text-sepGold transition-colors font-heading tracking-wide">Cargando...</p>
            <p id="sidebar-grade" class="text-xs text-white/50 font-medium">Ciclo 2025-2026</p>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto w-full scroll-smooth">
      <header class="glass-header shadow-sm h-20 flex items-center justify-between px-6 md:px-10 flex-shrink-0 sticky top-0 z-20">
        <div class="flex items-center">
          <button id="mobile-menu-btn" class="md:hidden mr-4 text-sepBurgundy bg-sepBurgundy/5 p-2 rounded-lg hover:bg-sepBurgundy/10 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
          </button>
          <div>
            <h2 class="text-xl md:text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sepGoldDark to-yellow-600 truncate font-heading tracking-tight">Historial de Asistencia</h2>
            <p id="current-date-display" class="text-xs text-gray-400 font-medium">Cargando fecha...</p>
          </div>
        </div>
        <div class="flex items-center space-x-4 md:space-x-6">
          <button onclick="window.location.href='../../index.html'" class="bg-gradient-to-r from-gray-100 to-white text-gray-600 border border-gray-200 shadow-sm hover:shadow hover:border-gray-300 px-4 py-2 rounded-xl text-sm font-bold transition-all duration-300 hover:-translate-y-0.5 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            <span class="hidden md:inline">Cerrar Sesión</span>
          </button>
        </div>
      </header>

      <div class="p-6 md:p-10 max-w-7xl mx-auto w-full h-full">
        <div class="bg-white rounded-3xl shadow-soft border border-gray-100 overflow-hidden flex flex-col border-emerald-500/20">
           <div class="bg-sepGreen px-6 py-5 border-b border-emerald-500/20 flex justify-between items-center">
              <h3 class="font-extrabold text-white tracking-wide text-base md:text-lg font-heading flex items-center">
                <svg class="w-5 h-5 mr-2 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Asistencias Registradas
              </h3>
           </div>
           <div class="p-0 overflow-x-auto min-h-[400px]">
             <table id="attendance-history-table" class="w-full text-left text-sm whitespace-nowrap">
               <thead class="text-gray-400 font-bold text-xs uppercase tracking-wider bg-gray-50 border-b border-gray-100">
                 <tr>
                   <th class="px-6 py-5">Fecha</th>
                   <th class="px-6 py-5">Hora de Entrada</th>
                   <th class="px-6 py-5">Estado</th>
                 </tr>
               </thead>
               <tbody class="divide-y divide-gray-50">
                  <tr>
                    <td colspan="3" class="px-6 py-10 text-center text-gray-400">
                      <svg class="animate-spin h-8 w-8 text-emerald-500 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                      Cargando historial de asistencia...
                    </td>
                  </tr>
               </tbody>
             </table>
           </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../../assets/js/main.js"></script>
  <script type="module">
    import { getStudentAttendance } from '../../assets/js/api-client.js';
    import { checkAuth } from '../../assets/js/auth-guard.js';

    document.addEventListener('DOMContentLoaded', async () => {
      const session = checkAuth(['alumno']);
      if (!session) return;

      const studentName = session.nombre;
      const initials = studentName.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
      
      document.getElementById('sidebar-name').textContent = studentName;
      document.getElementById('sidebar-avatar').textContent = initials;
      
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('current-date-display').textContent = 'Hoy es ' + new Date().toLocaleDateString('es-MX', options);

      try {
        const attendanceHistory = await getStudentAttendance();
        const tableBody = document.querySelector('#attendance-history-table tbody');
        tableBody.innerHTML = '';

        if (attendanceHistory && attendanceHistory.length > 0) {
          attendanceHistory.forEach(record => {
            const date = new Date(record.date);
            const formattedDate = date.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/\./g, '');
            const formattedTime = record.entry_time ? new Date(`2000/01/01 ${record.entry_time}`).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: true }) : '-';
            
            let statusClass = '';
            let statusText = '';
            if (record.status === 'A tiempo') {
              statusClass = 'bg-green-100 text-green-700';
              statusText = 'A tiempo';
            } else if (record.status === 'Retardo') {
              statusClass = 'bg-yellow-100 text-yellow-700';
              statusText = 'Retardo';
            } else if (record.status === 'Falta') {
              statusClass = 'bg-red-100 text-red-700';
              statusText = 'Falta';
            }

            tableBody.innerHTML += `
              <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-5 font-bold text-gray-800">${formattedDate}</td>
                <td class="px-6 py-5 text-gray-600 font-medium">${formattedTime}</td>
                <td class="px-6 py-5"><span class="${statusClass} px-3 py-1.5 rounded text-xs font-bold">${statusText}</span></td>
              </tr>
            `;
          });
        } else {
          tableBody.innerHTML = `
            <tr class="hover:bg-gray-50 transition-colors">
              <td colspan="3" class="px-6 py-10 text-center text-gray-400 font-medium">No tienes registros de asistencia recientes.</td>
            </tr>
          `;
        }
      } catch (e) {
        console.error("Error loading attendance history:", e);
        document.querySelector('#attendance-history-table tbody').innerHTML = `
          <tr class="hover:bg-gray-50 transition-colors">
            <td colspan="3" class="px-6 py-10 text-center text-gray-400">Error al cargar el historial de asistencia.</td>
          </tr>
        `;
      }
    });
  </script>
</body>
</html>
